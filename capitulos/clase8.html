<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clase 8</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="container">
  <h1>Clase 8</h1>

  <h2>Números</h2>

<div class="morse">
  <div class="morse-grid">
    <div>
      1   .---- <br>
      2   ..--- <br>
      3   ...-- <br>
      4   ....- <br>
      5   ..... 
    </div>
    <div>
      6   -.... <br>
      7   --... <br>
      8   ---.. <br>
      9   ----. <br>
      0   ----- 
    </div>
  </div>
</div>

  <h2>Audios</h2>

<!-- AUDIO 1 -->
<div class="audio-block">

  <div class="audio-row">
    <span class="audio-title">Audio 1</span>

    <audio controls src="../audio/clase8/audio1.mp3"></audio>

    <button class="btn" onclick="toggleRespuesta('r1', this)">
      Mostrar respuesta
    </button>
  </div>

  <div id="r1" class="morse" style="display:none; margin-top:10px;">
    W J C W J C W J C W J C
  </div>

</div>

<!-- AUDIO 2 -->
<div class="audio-block">

  <div class="audio-row">
    <span class="audio-title">Audio 2</span>

    <audio controls src="../audio/clase8/audio2.mp3"></audio>

    <button class="btn" onclick="toggleRespuesta('r2', this)">
      Mostrar respuesta
    </button>
  </div>

  <div id="r2" class="morse" style="display:none; margin-top:10px;">
    W J C W J C W J C W J C
  </div>

</div>

<!-- AUDIO 3 -->
<div class="audio-block">

  <div class="audio-row">
    <span class="audio-title">Audio 3</span>

    <audio controls src="../audio/clase8/audio3.mp3"></audio>

    <button class="btn" onclick="toggleRespuesta('r3', this)">
      Mostrar respuesta
    </button>
  </div>

  <div id="r3" class="morse" style="display:none; margin-top:10px;">
    W J C W J C W J C W J C
  </div>

</div>

  <div class="nav-buttons">
    <a href="clase7.html" class="btn">Anterior</a>
    <a href="../index.html" class="btn nav-center">Inicio</a>
  </div>

</div>

<script>
function toggleRespuesta(id, btn) {
  const div = document.getElementById(id);

  if (div.style.display === "none") {
    div.style.display = "block";
    btn.innerText = "Ocultar respuesta";
  } else {
    div.style.display = "none";
    btn.innerText = "Mostrar respuesta";
  }
}
</script>

</body>
</html>
