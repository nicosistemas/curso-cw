<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clase 2</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="container">
  <h1>Clase 2</h1>

  <h2>Letras A U V</h2>

  <div class="morse">
    A   .-<br>
    U   ..-<br>
    V   ...-
  </div>

  <h2>Audios</h2>

<!-- AUDIO 1 -->
<div class="audio-block">

  <div class="audio-row">
    <span class="audio-title">Audio 1</span>

    <audio controls src="../audio/clase2/audio1.mp3"></audio>

    <button class="btn" onclick="toggleRespuesta('r1', this)">
      Mostrar respuesta
    </button>
  </div>

  <div id="r1" class="morse" style="display:none; margin-top:10px;">
    E I S H E S I H E I S H
  </div>

</div>

<!-- AUDIO 2 -->
<div class="audio-block">

  <div class="audio-row">
    <span class="audio-title">Audio 2</span>

    <audio controls src="../audio/clase2/audio2.mp3"></audio>

    <button class="btn" onclick="toggleRespuesta('r2', this)">
      Mostrar respuesta
    </button>
  </div>

  <div id="r2" class="morse" style="display:none; margin-top:10px;">
    E I S H E S I H E I S H
  </div>

</div>

<!-- AUDIO 3 -->
<div class="audio-block">

  <div class="audio-row">
    <span class="audio-title">Audio 3</span>

    <audio controls src="../audio/clase2/audio3.mp3"></audio>

    <button class="btn" onclick="toggleRespuesta('r3', this)">
      Mostrar respuesta
    </button>
  </div>

  <div id="r3" class="morse" style="display:none; margin-top:10px;">
    E I S H E S I H E I S H
  </div>

</div>

  <div class="nav-buttons">
    <a href="../index.html" class="btn">Inicio</a>
    <a href="clase3.html" class="btn">Siguiente ➡</a>
  </div>

</div>

<script>
function toggleRespuesta(id, btn) {
  const div = document.getElementById(id);

  if (div.style.display === "none") {
    div.style.display = "block";
    btn.innerText = "Ocultar respuesta";
  } else {
    div.style.display = "none";
    btn.innerText = "Mostrar respuesta";
  }
}
</script>

</body>
</html>
